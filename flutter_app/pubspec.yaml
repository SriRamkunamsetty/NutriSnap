name: nutrisnap_ai
description: A health and fitness app that uses Gemini AI to analyze food images and provide personalized coaching.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6
  firebase_storage: ^11.5.6
  google_generative_ai: ^0.4.3
  provider: ^6.1.1
  intl: ^0.19.0
  fl_chart: ^0.66.0
  image_picker: ^1.0.7
  google_sign_in: ^6.1.6
  google_fonts: ^6.1.0
  lucide_icons: ^0.321.0
  flutter_animate: ^4.5.0
  shared_preferences: ^2.2.2
  share_plus: ^7.2.2
  http: ^1.2.0
  path_provider: ^2.1.2
  glassmorphism: ^3.0.0
  smooth_page_indicator: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
